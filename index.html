<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>m, light</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; background: #f5f5f5; }
        h1 { color: #7D4CDB; }
        button { background: #7D4CDB; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>m, light</h1>
    <p>Rahisisha Malipo</p>
    <button onclick="lipa()">Lipa Sasa na Pi</button>
    
    <script>
        Pi.init({ version: "2.0", sandbox: true });
        
        function lipa() {
            Pi.authenticate(['payments'], function(auth) {
                Pi.createPayment({
                    amount: 0.01,
                    memo: "Test Payment Step 10",
                    metadata: { test: true },
                    onReadyForServerApproval: function(paymentId) {
                        // Tunamdanganya Pi kwamba server ime-approve
                        console.log("Approved:", paymentId);
                    },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        // Tunamdanganya Pi kwamba server ime-complete
                        console.log("Completed:", txid);
                        alert("Malipo yamekamilika!");
                    },
                    onCancel: function(paymentId) {
                        console.log("Cancelled:", paymentId);
                    },
                    onError: function(error, payment) {
                        console.log("Error:", error);
                    }
                });
            });
        }
    </script>
</body>
</html>
