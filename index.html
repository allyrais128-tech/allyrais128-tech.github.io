<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rahisisha Malipo</title>
  
  <!-- Pi SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script>
    // Anzisha Pi SDK kwenye Sandbox mode
    Pi.init({ version: "2.0", sandbox: "true" });

    // Function ya malipo
    async function lipaSasa() {
      const paymentData = {
        amount: 0.01,
        memo: "Jaribio la malipo",
        metadata: { item: "test" }
      };

      const callbacks = {
        onReadyForServerApproval: function(paymentId) {
          console.log("Payment ready:", paymentId);
          document.getElementById("txt").innerText = "Inasubiri approval...";
        },
        onReadyForServerCompletion: function(paymentId, txid) {
          console.log("Payment completed:", paymentId, txid);
          document.getElementById("txt").innerText = "Malipo yamekamilika! ✅";
        },
        onCancel: function(paymentId) {
          document.getElementById("txt").innerText = "Malipo yamefutwa";
        },
        onError: function(error, payment) {
          alert("Hitilafu: " + error);
          document.getElementById("txt").innerText = "Kuna hitilafu";
        }
      };

      try {
        await Pi.createPayment(paymentData, callbacks);
      } catch (error) {
        alert("Hitilafu ya kuanzisha malipo: " + error);
      }
    }
  </script>
</head>

<body style="font-family:sans-serif; text-align:center; padding-top:100px; background:#f5f5f5;">
  <h1 style="color:#6B46C1;">Rahisisha Malipo</h1>
  <p>Bonyeza chini kulipa kwa Testnet Pi</p>
  
  <button id="btn" onclick="lipaSasa()" 
    style="background:#6B46C1; color:white; border:none; padding:15px 30px; 
           font-size:18px; border-radius:10px; cursor:pointer;">
    Lipa Sasa na Pi
  </button>
  
  <p id="txt" style="margin-top:20px; font-weight:bold;">Tayari kulipa</p>
</body>
</html>
