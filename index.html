<!DOCTYPE html>
<html>
<head>
  <title>m light</title>
  <meta charset="UTF-8">
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="text-align:center; font-family:sans-serif; padding:50px;">
  <h1 style="color:#8B5CF6;">m, light</h1>
  <p>Rahisisha Malipo</p>
  <button onclick="lipaNaPi()" style="background:#8B5CF6; color:white; padding:15px 30px; border:none; border-radius:10px; font-size:18px;">
    Lipa Sasa na Pi
  </button>
  
  <div id="result" style="margin-top:20px;"></div>

  <script>
    Pi.init({ version: "2.0", sandbox: true });
    
    function lipaNaPi() {
      document.getElementById('result').innerText = "Inaunganisha...";
      
      Pi.authenticate(['payments'], function(auth) {
        document.getElementById('result').innerText = "Karibu " + auth.user.username;
        
        Pi.createPayment({
          amount: 0.001,
          memo: "Test m light",
          metadata: {}
        }, {
          onReadyForServerApproval: (paymentId) => {
            document.getElementById('result').innerText = "Malipo tayari: " + paymentId;
          },
          onReadyForServerCompletion: (paymentId, txid) => {
            document.getElementById('result').innerText = "Umefanikiwa! TxID: " + txid;
          },
          onCancel: (paymentId) => {
            document.getElementById('result').innerText = "Umefutiza malipo";
          },
          onError: (error, payment) => {
            document.getElementById('result').innerText = "Error: " + error;
          }
        });
      });
    }
  </script>
</body>
</html>
