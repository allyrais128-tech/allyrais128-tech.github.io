    <p id="txt" style="margin-top:20px;font-weight:bold">Tayari kulipa</p>

<script>
    Pi.init({ version: "2.0", sandbox: true });

    function lipa() {
        document.getElementById('txt').innerText = "Inaunganisha...";
        document.getElementById('btn').disabled = true;

        Pi.authenticate(['payments']).then(function(auth) {
  
Pi.createPayment({
  amount: 0.001,
  memo: "Test Payment",
  metadata: { test: true },
  onReadyForServerApproval: function(paymentId) {
    document.getElementById('txt').innerText = "Inaidhinisha...";
    Pi.approvePayment(paymentId);
  },
  onReadyForServerCompletion: function(paymentId, txid) {
    document.getElementById('txt').innerText = "Umefanikiwa! TxID: " + txid;
  },
  onCancel: function(paymentId) {
    document.getElementById('txt').innerText = "Umesitisha";
    document.getElementById('btn').disabled = false;
  },
  onError: function(error, payment) {
    document.getElementById('txt').innerText = "Error: " + error;
    document.getElementById('btn').disabled = false;
  }
});
